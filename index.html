---
layout: default
title: "Do Thao Anh | Blog, my cats and the journey to a PhD"
---

<h2>Nhật ký các em mèo 🐾</h2>

<div class="cat-grid-modern">
  {% for post in site.posts %}
    <div class="cat-card" onclick="window.location='{{ post.url | relative_url }}';">
      
      {% if post.image %}
        <div class="cat-card-img">
          <img src="{{ post.image | relative_url }}" alt="{{ post.title }}" loading="lazy">
        </div>
      {% endif %}

      <div class="cat-card-info">
        <h3>
          <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </h3>
        <p>📅 {{ post.date | date: "%d/%m/%Y" }}</p>
      </div>

    </div>
  {% endfor %}
</div>
